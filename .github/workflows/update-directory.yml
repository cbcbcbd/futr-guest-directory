name: Update guest directory

# Runs the detector daily, commits data/guests.json if new episodes were found,
# and opens an issue if any new episode needs a guest name filled in by hand.
# Also runnable on demand from the Actions tab (workflow_dispatch).

on:
  schedule:
    - cron: "0 13 * * *"   # daily at 13:00 UTC (~morning US). Adjust freely.
  workflow_dispatch:

permissions:
  contents: write          # commit guests.json back
  issues: write            # open a [NEEDS REVIEW] issue

concurrency:
  group: update-directory
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run updater (stdlib only, no pip install)
        run: python3 scripts/update_directory.py

      - name: Detect changes
        id: diff
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated directory
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "futr-directory-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Auto-update guest directory ($(date -u +%Y-%m-%d))"
          git push

      - name: Open issue for rows needing review
        if: hashFiles('data/review_needed.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "The daily directory update found episode(s) with no clean \`Guest:\` tag."
            echo "Edit \`data/guests.json\` and replace \`[NEEDS REVIEW]\` with the guest name"
            echo "(or set the row's show to \`No Guest\` to drop a solo/editorial episode)."
            echo ""
            cat data/review_needed.txt
          } > issue_body.txt
          gh issue create \
            --title "Guest directory: rows need a guest name ($(date -u +%Y-%m-%d))" \
            --body-file issue_body.txt \
            --label "needs-review" || true
