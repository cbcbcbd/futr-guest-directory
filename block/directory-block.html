<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');</style>
<div id="futr-guest-directory" style="font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;max-width:100%;color:#1a1a1a;">
  <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px;">
    <input id="fgd-q" type="text" placeholder="Search guest, company, or episode…" style="flex:1;min-width:220px;padding:10px 12px;font-size:15px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box;">
    <select id="fgd-show" style="padding:10px 12px;font-size:15px;border:1px solid #ccc;border-radius:8px;background:#fff;">
      <option value="">All shows</option>
      <option value="FUTR.tv">FUTR.tv</option>
      <option value="IT Visionaries">IT Visionaries</option>
      <option value="The Fleet">The Fleet</option>
    </select>
  </div>
  <div id="fgd-count" style="font-size:13px;color:#666;margin-bottom:8px;"></div>
  <div style="overflow-x:auto;border:1px solid #e5e5e5;border-radius:10px;">
    <table style="width:100%;border-collapse:collapse;font-size:14px;">
      <thead>
        <tr style="background:#000000;color:#fff;text-align:left;">
          <th data-k="g" style="padding:10px 12px;cursor:pointer;white-space:nowrap;">Guest &#8597;</th>
          <th data-k="c" style="padding:10px 12px;cursor:pointer;white-space:nowrap;">Company / Title &#8597;</th>
          <th data-k="s" style="padding:10px 12px;cursor:pointer;white-space:nowrap;">Show &#8597;</th>
          <th data-k="t" style="padding:10px 12px;cursor:pointer;">Episode &#8597;</th>
          <th data-k="d" style="padding:10px 12px;cursor:pointer;white-space:nowrap;">Date &#8597;</th>
        </tr>
      </thead>
      <tbody id="fgd-body"></tbody>
    </table>
  </div>
</div>
<script>
(function(){
  var DATA=[];
  var q=document.getElementById('fgd-q'),show=document.getElementById('fgd-show'),
      body=document.getElementById('fgd-body'),count=document.getElementById('fgd-count');
  var sortK='d',sortAsc=false;
  function esc(s){var d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;}
  function render(){
    var term=q.value.toLowerCase().trim(),sh=show.value;
    var rows=DATA.filter(function(r){
      if(sh&&r.s!==sh)return false;
      if(!term)return true;
      return (r.g+' '+r.c+' '+r.t).toLowerCase().indexOf(term)>-1;
    });
    rows.sort(function(a,b){var x=(a[sortK]||'').toLowerCase(),y=(b[sortK]||'').toLowerCase();
      return (x<y?-1:x>y?1:0)*(sortAsc?1:-1);});
    body.innerHTML=rows.map(function(r){
      return '<tr style="border-top:1px solid #eee;">'+
        '<td style="padding:9px 12px;"><a href="'+esc(r.u)+'" style="color:hsl(7, 55%, 55%);text-decoration:none;font-weight:500;">'+esc(r.g)+'</a></td>'+
        '<td style="padding:9px 12px;color:#444;">'+esc(r.c)+'</td>'+
        '<td style="padding:9px 12px;white-space:nowrap;"><a href="'+esc(r.su)+'" style="color:hsl(7, 55%, 55%);text-decoration:none;">'+esc(r.s)+'</a></td>'+
        '<td style="padding:9px 12px;color:#222;">'+esc(r.t)+'</td>'+
        '<td style="padding:9px 12px;white-space:nowrap;color:#666;">'+esc(r.d)+'</td></tr>';
    }).join('');
    count.textContent=rows.length+' of '+DATA.length+' episodes';
  }
  q.addEventListener('input',render);show.addEventListener('change',render);
  document.querySelectorAll('#futr-guest-directory th').forEach(function(th){
    th.addEventListener('click',function(){var k=th.getAttribute('data-k');
      if(sortK===k)sortAsc=!sortAsc;else{sortK=k;sortAsc=true;}render();});
  });
  // ---- FETCH WIRING: pull rows from the public JSON, then render once. ----
  // (This is the ONLY change from the published block: inline DATA -> fetch.)
  function fgdPublishable(r){return r.g && r.g.indexOf('[NEEDS REVIEW]')===-1 && r.s!=='No Guest';}
  count.textContent='Loading...';
  fetch('https://raw.githubusercontent.com/cbcbcbd/futr-guest-directory/main/data/guests.json',{cache:'no-cache'})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(rows){DATA=rows.filter(fgdPublishable);render();})
    .catch(function(e){count.textContent='Could not load the directory ('+e.message+').';});
})();
</script>
